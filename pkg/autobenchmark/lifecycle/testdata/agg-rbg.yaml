apiVersion: workloads.x-k8s.io/v1alpha2
kind: RoleBasedGroup
metadata:
  name: test-agg
  namespace: default
spec:
  roles:
  - name: worker
    replicas: 1
    standalonePattern:
      template:
        spec:
          containers:
          - name: sglang-worker
            image: sglang:latest
            command:
            - python3
            - -m
            - sglang.launch_server
            - --model-path
            - /models/llama
            - --port
            - "8000"
            - --host
            - $(POD_IP)
            - --mem-fraction-static
            - "0.85"
            - --tensor-parallel-size
            - "4"
