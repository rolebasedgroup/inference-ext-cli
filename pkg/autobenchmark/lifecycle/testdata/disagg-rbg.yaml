apiVersion: workloads.x-k8s.io/v1alpha2
kind: RoleBasedGroup
metadata:
  name: test-disagg
  namespace: default
spec:
  roles:
  - name: prefill
    replicas: 1
    standalonePattern:
      template:
        spec:
          containers:
          - name: sglang-prefill
            image: sglang:latest
            command:
            - python3
            - -m
            - sglang.launch_server
            - --model-path
            - /models/llama
            - --disaggregation-mode
            - prefill
            - --port
            - "8000"
            - --host
            - $(POD_IP)
            - --mem-fraction-static
            - "0.9"
  - name: decode
    replicas: 2
    standalonePattern:
      template:
        spec:
          containers:
          - name: sglang-decode
            image: sglang:latest
            command:
            - python3
            - -m
            - sglang.launch_server
            - --model-path
            - /models/llama
            - --disaggregation-mode
            - decode
            - --port
            - "8000"
            - --host
            - $(POD_IP)
            - --mem-fraction-static
            - "0.9"
---
apiVersion: v1
kind: Service
metadata:
  name: s-test-disagg-inference
  namespace: default
spec:
  ports:
  - port: 8000
    protocol: TCP
    targetPort: 8000
  selector:
    rolebasedgroup.workloads.x-k8s.io/name: test-disagg
  type: ClusterIP
